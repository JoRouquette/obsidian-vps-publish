services:
  obsidian-vps-publish:
    image: jorouquette/obsidian-vps-publish:latest
    pull_policy: always

    environment:
      NODE_ENV: 'production'
      PORT: '3000'
      CONTENT_ROOT: /content
      ASSETS_ROOT: /assets
      UI_ROOT: /ui
      UI_SERVER_ROOT: /ui-server
      SSR_ENABLED: 'false'
      LOGGER_LEVEL: 'warn'
      ALLOWED_ORIGINS: https://example.com,app://obsidian
      BASE_URL: https://example.com
      SITE_NAME: Scribe d'Ektaron
      HOME_WELCOME_TITLE: Bienvenue sur votre site de lore.
      AUTHOR: Jonathan Rouquette
      REPO_URL: https://github.com/JoRouquette/obsidian-vps-publish
      REPORT_ISSUES_URL: https://github.com/JoRouquette/obsidian-vps-publish/issues
      LOG_FILE_PATH: /app/tmp/logs/node.log
      API_KEY: CHANGE_ME_PRODUCTION_API_KEY
      ADMIN_API_PATH: /internal-admin-dashboard
      ADMIN_USERNAME_HASH: 'scrypt$$CHANGE_ME_SALT$$CHANGE_ME_HASH'
      ADMIN_PASSWORD_HASH: 'scrypt$$CHANGE_ME_SALT$$CHANGE_ME_HASH'
      MAX_ACTIVE_REQUESTS: '200'
      MAX_CONCURRENT_FINALIZATION_JOBS: '8'
      MAX_ASSET_SIZE_BYTES: '10485760'
      IMAGE_OPTIMIZATION_ENABLED: 'true'
      IMAGE_CONVERT_TO_WEBP: 'true'
      IMAGE_QUALITY: '85'
      IMAGE_MAX_WIDTH: '4096'
      IMAGE_MAX_HEIGHT: '4096'
      # If you enable ClamAV in production, uncomment and adapt the lines below.
      # VIRUS_SCANNER_ENABLED: 'true'
      # CLAMAV_HOST: clamav
      # CLAMAV_PORT: '3310'
      # CLAMAV_TIMEOUT: '10000'
