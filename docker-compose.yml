services:
  obsidian-vps-publish:
    user: '1000:1000'
    container_name: obsidian-vps-publish
    image: obsidian-vps-publish:local
    init: true
    restart: unless-stopped
    stop_grace_period: 20s

    ports:
      - '3000:3000'

    volumes:
      - content:/content
      - assets:/assets

    labels:
      com.centurylinklabs.watchtower.enable: 'true'

    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health > /dev/null || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  content: {}
  assets: {}
