<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Page With Assets - E2E Test Site</title>
    <meta name="description" content="A page with images and other assets" />
  </head>
  <body>
    <div data-testid="viewer-content">
      <h1>Page With Assets</h1>
      <p>This page demonstrates asset embedding and rendering.</p>

      <h2>Images</h2>
      <figure>
        <img src="/assets/test-image.png" alt="Test Image" width="200" height="150" />
        <figcaption>A test image embedded in the page</figcaption>
      </figure>

      <h2>Asset Links</h2>
      <p>Download: <a href="/assets/test-document.pdf" download>Test Document (PDF)</a></p>
      <p>External image reference with full URL.</p>

      <h2>Multiple Images</h2>
      <div class="image-gallery">
        <img src="/assets/gallery-1.jpg" alt="Gallery Image 1" width="100" height="100" />
        <img src="/assets/gallery-2.jpg" alt="Gallery Image 2" width="100" height="100" />
      </div>

      <p><a href="/">Back to Home</a></p>
    </div>
  </body>
</html>
