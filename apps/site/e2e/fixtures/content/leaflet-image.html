<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Leaflet Image Map - E2E Test Site</title>
    <meta name="description" content="A page with an image overlay Leaflet map" />
  </head>
  <body>
    <div>
      <h1>Leaflet Image Map</h1>
      <p>This page contains a Leaflet image map for E2E testing.</p>
      <div
        class="leaflet-map-placeholder"
        data-leaflet-map-id="e2e-map-image"
        data-leaflet-block='{"id":"e2e-map-image","defaultZoom":6,"scale":1000,"height":"500px","width":"100%","imageOverlays":[{"path":"debug-map.svg","topLeft":[0,0],"bottomRight":[0,0]}]}'
      ></div>
      <p>Content after the map.</p>
    </div>
  </body>
</html>
