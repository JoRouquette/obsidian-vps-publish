<!doctype html>
<html lang="fr" class="theme-light">
  <head>
    <meta charset="utf-8" />
    <base href="/" />
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Explorez le contenu publié depuis un coffre Obsidian" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- PWA: Web App Manifest -->
    <link rel="manifest" href="manifest.webmanifest" />

    <!-- PWA: Theme colors (light/dark) -->
    <meta name="theme-color" content="#1a1e24" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)" />

    <!-- PWA: Android support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Scribe" />

    <!-- PWA: iOS support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Scribe" />

    <!-- iOS icons (multiple sizes for different devices) -->
    <link rel="apple-touch-icon" href="assets/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="assets/icons/icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="96x96" href="assets/icons/icon-96x96.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="assets/icons/icon-128x128.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="assets/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="assets/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="384x384" href="assets/icons/icon-384x384.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="assets/icons/icon-512x512.png" />

    <!-- PWA: Windows/Microsoft support -->
    <meta name="msapplication-TileColor" content="#1a1e24" />
    <meta name="msapplication-TileImage" content="assets/icons/icon-144x144.png" />

    <!-- Disable automatic phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Critical resource hints for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload critical font (Roboto 400 for body text - most used weight) -->
    <link
      rel="preload"
      href="https://fonts.gstatic.com/s/roboto/v32/KFOmCnqEu92Fr1Mu4mxK.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Load fonts with display=swap for non-blocking rendering -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Material Symbols & Icons (loaded async to not block LCP) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@200;400;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded&display=swap"
        rel="stylesheet"
      />
      <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@200;400;600&display=swap"
        rel="stylesheet"
      />
      <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
