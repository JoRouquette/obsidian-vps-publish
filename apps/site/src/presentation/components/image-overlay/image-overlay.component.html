<dialog
  #dialogEl
  class="image-overlay"
  aria-label="Visionneuse d'image"
  (click)="onBackdropClick($event)"
  (dblclick)="onDoubleClick($event)"
  data-testid="image-viewer"
>
  <div class="overlay-controls">
    <!-- Zoom controls group -->
    <div class="control-group">
      <button
        mat-icon-button
        class="control-btn"
        (click)="zoomOut()"
        title="Zoom arrière (-)"
        aria-label="Zoom arrière"
        [disabled]="imgError()"
      >
        <mat-icon>remove</mat-icon>
      </button>
      <button
        mat-icon-button
        class="control-btn"
        (click)="resetZoom()"
        title="Ajuster (0)"
        aria-label="Réinitialiser le zoom"
        [disabled]="imgError()"
      >
        <mat-icon>fit_screen</mat-icon>
      </button>
      <button
        mat-icon-button
        class="control-btn"
        (click)="zoomIn()"
        title="Zoom avant (+)"
        aria-label="Zoom avant"
        [disabled]="imgError()"
      >
        <mat-icon>add</mat-icon>
      </button>
    </div>

    <!-- Close button -->
    <div class="control-group">
      <button
        #closeBtn
        mat-icon-button
        class="control-btn close-btn"
        (click)="close()"
        title="Fermer (Esc)"
        aria-label="Fermer"
      >
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>

  <div class="image-container">
    <!-- Loading skeleton -->
    @if (imgLoading()) {
      <div class="img-skeleton" aria-hidden="true"></div>
    }

    <!-- Error state -->
    @if (imgError()) {
      <output class="img-error">
        <mat-icon class="img-error-icon" aria-hidden="true">broken_image</mat-icon>
        <p class="img-error-text">
          Image non disponible
          @if (altText()) {
            — {{ altText() }}
          }
        </p>
      </output>
    }

    <img
      #imageEl
      [src]="imageSrc()"
      [alt]="altText()"
      [style.transform]="imageTransform()"
      [style.cursor]="scale() > 1 ? 'grab' : 'zoom-in'"
      [class.is-loading]="imgLoading()"
      [class.is-error]="imgError()"
      (load)="onImageLoad()"
      (error)="onImageError()"
      (mousedown)="onMouseDown($event)"
      (wheel)="onWheel($event)"
      (touchstart)="onTouchStart($event)"
      (touchmove)="onTouchMove($event)"
      class="overlay-image"
    />
  </div>

  <!-- Zoom level indicator -->
  @if (!imgError()) {
    <div class="zoom-indicator">
      <span class="zoom-value">{{ zoomPercentage() }}%</span>
      <span class="hint">Double-clic pour zoomer</span>
    </div>
  }
</dialog>
