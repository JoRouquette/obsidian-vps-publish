# obsidian-vps-publish/.github/workflows/sync-mirrors.yml
# Régénère chaque miroir AUTO-SUFFISANT depuis la source unique du monorepo,
# et pousse dans l'ordre core-domain -> core-application -> vps-publish.
# Ne s'exécute que sur un commit de release (chore(release): ...).
# Pré-requis : secret SUBTREE_SYNC_TOKEN (PAT fine-grained, Contents:write sur les 3 miroirs).
name: Sync mirrors after release

on:
  workflow_run:
    workflows: ['Workspace CI, Release and Publishing']
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22.14.0'

concurrency:
  group: sync-mirrors
  cancel-in-progress: false

jobs:
  gate:
    name: Detect release commit
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "HEAD: $MSG"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "$MSG" == chore\(release\):* ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  sync-mirrors:
    name: Regenerate and push mirrors (ordered)
    needs: gate
    if: needs.gate.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Build and push mirrors
        env:
          GH_PAT: ${{ secrets.SUBTREE_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          ROOT="$PWD"
          CI="$ROOT/tools/mirror/ci"

          # finalize_and_push <repo> <ci_src:dest> [<ci_src:dest> ...]
          finalize_and_push() {
            local repo="$1"; shift
            local out="$ROOT/out"
            [ -f "$out/eslint.config.mirror.cjs" ] && mv -f "$out/eslint.config.mirror.cjs" "$out/eslint.config.cjs"
            [ -f "$out/tsconfig.mirror.json" ] && mv -f "$out/tsconfig.mirror.json" "$out/tsconfig.json"
            rm -rf "$out/.github"; mkdir -p "$out/.github/workflows"
            local spec src dest
            for spec in "$@"; do
              src="${spec%%:*}"; dest="${spec##*:}"
              cp "$CI/$src" "$out/.github/workflows/$dest"
            done
            rm -f "$out/project.json"
            ( cd "$out"
              git init -q
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add -A
              git commit -q -m "chore: sync from monorepo (${GITHUB_SHA})"
              git push -q --force "https://x-access-token:${GH_PAT}@github.com/JoRouquette/${repo}.git" HEAD:main )
            echo "::notice::pushed $repo"
          }

          # ---- 1) core-domain (aucune dépendance) ----
          rm -rf "$ROOT/out"; cp -r libs/core-domain "$ROOT/out"
          finalize_and_push vps-publish-core-domain "core-domain-release.yml:release.yml"

          # ---- 2) core-application (vendor core-domain) ----
          rm -rf "$ROOT/out"; cp -r libs/core-application "$ROOT/out"
          mkdir -p "$ROOT/out/libs/core-domain"
          cp -r libs/core-domain/src "$ROOT/out/libs/core-domain/src"
          finalize_and_push vps-publish-core-application "core-application-release.yml:release.yml"

          # ---- 3) vps-publish (plugin ; vendor les deux libs) ----
          rm -rf "$ROOT/out"; cp -r apps/obsidian-vps-publish "$ROOT/out"
          mkdir -p "$ROOT/out/libs/core-domain" "$ROOT/out/libs/core-application"
          cp -r libs/core-domain/src "$ROOT/out/libs/core-domain/src"
          cp -r libs/core-application/src "$ROOT/out/libs/core-application/src"
          finalize_and_push vps-publish "vps-publish-release.yml:release.yml" "vps-publish-test.yml:test.yml"

  mirror-release:
    name: Create marketplace release on vps-publish
    needs: [gate, sync-mirrors]
    if: needs.gate.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm install --no-audit --no-fund --ignore-scripts --legacy-peer-deps
        env:
          HUSKY: 0
      - run: npm run build
      - run: npm run package:plugin
      - id: manifest
        run: |
          echo "plugin_id=$(node -e "console.log(require('./manifest.json').id)")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -e "console.log(require('./manifest.json').version)")" >> "$GITHUB_OUTPUT"
      - name: Create or update release on vps-publish
        env:
          GH_TOKEN: ${{ secrets.SUBTREE_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          ID="${{ steps.manifest.outputs.plugin_id }}"
          V="${{ steps.manifest.outputs.version }}"
          A="dist/$ID/main.js dist/$ID/manifest.json dist/$ID/styles.css dist/$ID/versions.json"
          if gh release view "$V" --repo JoRouquette/vps-publish >/dev/null 2>&1; then
            gh release upload "$V" $A --repo JoRouquette/vps-publish --clobber
          else
            gh release create "$V" $A --repo JoRouquette/vps-publish --target main \
              --title "Publish to VPS v$V" --notes "Automated release synced from monorepo."
          fi
