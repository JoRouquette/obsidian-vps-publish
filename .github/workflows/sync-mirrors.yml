# obsidian-vps-publish/.github/workflows/sync-mirrors.yml
# Workflow AUTONOME (ne modifie pas ci-release.yml).
# Se déclenche à la fin du pipeline principal ; ne s'exécute QUE sur un commit
# de release (chore(release): ...), donc en pratique « après chaque release ».
#
# Pré-requis : secret SUBTREE_SYNC_TOKEN (PAT fine-grained, Contents:write sur
# vps-publish, vps-publish-core-domain, vps-publish-core-application).
name: Sync mirrors after release

on:
  workflow_run:
    workflows: ['Workspace CI, Release and Publishing']
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22.14.0'

concurrency:
  group: sync-mirrors
  cancel-in-progress: false

jobs:
  gate:
    name: Detect release commit
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "HEAD subject: $MSG"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "$MSG" == chore\(release\):* ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  sync-subtrees:
    name: Push subtrees to mirror repos
    needs: gate
    if: needs.gate.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Push subtrees
        env:
          GH_PAT: ${{ secrets.SUBTREE_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sync() {
            local prefix="$1" repo="$2" branch="_split_$2"
            echo "::group::split $prefix -> $repo"
            git subtree split --prefix="$prefix" -b "$branch"
            git push --force "https://x-access-token:${GH_PAT}@github.com/JoRouquette/${repo}.git" "$branch:main"
            git branch -D "$branch"
            echo "::endgroup::"
          }
          sync "apps/obsidian-vps-publish" "vps-publish"
          sync "libs/core-domain"          "vps-publish-core-domain"
          sync "libs/core-application"     "vps-publish-core-application"

  mirror-release:
    name: Create marketplace release on vps-publish
    needs: [gate, sync-subtrees]
    if: needs.gate.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm install --no-audit --no-fund --ignore-scripts --legacy-peer-deps
        env:
          HUSKY: 0
      - run: npm run build
      - run: npm run package:plugin
      - name: Read manifest id/version
        id: manifest
        run: |
          echo "plugin_id=$(node -e "console.log(require('./manifest.json').id)")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -e "console.log(require('./manifest.json').version)")" >> "$GITHUB_OUTPUT"
      - name: Create or update GitHub Release on mirror (vps-publish)
        env:
          GH_TOKEN: ${{ secrets.SUBTREE_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          ID="${{ steps.manifest.outputs.plugin_id }}"
          V="${{ steps.manifest.outputs.version }}"
          ASSETS="dist/$ID/main.js dist/$ID/manifest.json dist/$ID/styles.css dist/$ID/versions.json"
          if gh release view "$V" --repo JoRouquette/vps-publish >/dev/null 2>&1; then
            gh release upload "$V" $ASSETS --repo JoRouquette/vps-publish --clobber
          else
            gh release create "$V" $ASSETS \
              --repo JoRouquette/vps-publish \
              --target main \
              --title "Publish to VPS v$V" \
              --notes "Automated release synced from monorepo (obsidian-vps-publish)."
          fi
