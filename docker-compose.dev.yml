services:
  obsidian-vps-publish:
    build:
      context: .
      dockerfile: Dockerfile

    image: obsidian-vps-publish:dev

    user: '0:0'

    env_file:
      - .env.dev

    # Override .env.dev relative paths with Docker absolute paths
    # (environment section takes precedence over env_file)
    environment:
      - CONTENT_ROOT=/content
      - ASSETS_ROOT=/assets
      - UI_ROOT=/ui
      - UI_SERVER_ROOT=/ui-server

    volumes:
      - type: volume
        source: content
        target: /content
        volume:
          nocopy: false
      - type: volume
        source: assets
        target: /assets
        volume:
          nocopy: false

volumes:
  content:
    driver: local
  assets:
    driver: local
